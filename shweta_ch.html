<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shweta | Framed for Fame</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@lottiefiles/dotlottie-wc@0.9.10/dist/dotlottie-wc.js" type="module"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: #f48fb1; 
            font-family: 'Fredoka', sans-serif;
            overflow: hidden;
        }

        .shweta-header {
            position: relative;
            width: 100vw;
            height: 100vh;
            background-image: url('shweta_ch.jpg'); 
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
        }

        /* Positioned to the right to avoid overlapping Shweta on the left */
        .typing-container {
            width: 750px;
            position: relative;
            top: 30%; 
            left: 50%; 
            transform: translate(-50%, 0);
            z-index: 10;
        }

        .typing-text {
            font-size: 1.1rem;
            line-height: 1.8;
            letter-spacing: 0.01em;
            color: #880e4f; 
            font-weight: 600;
            text-align: left;
            display: inline-block;
            white-space: pre-wrap;
        }

        /* Animation - Positioned in the bottom right corner */
        .lottie-container {
            position: absolute;
            bottom: 20px;
            right: 20px;
            z-index: 5;
        }

        .back-btn {
            position: fixed;
            bottom: 30px;
            left: 30px;
            padding: 12px 25px;
            background: white;
            color: #880e4f;
            border-radius: 8px;
            text-decoration: none;
            z-index: 100;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        #interact-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0);
            z-index: 9999;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="interact-overlay"></div>

    <audio id="shweta-music">
        <source src="john.mp3" type="audio/mpeg">
    </audio>

    <div class="shweta-header">
        <div class="typing-container">
            <span class="typing-text" id="shweta-desc"></span>
        </div>

        <!-- New Animation Section -->
        <div class="lottie-container">
            <dotlottie-wc 
                src="https://lottie.host/87278b24-9b62-47ec-b7e0-b8c19f0e864e/KjDSCyVhgO.lottie" 
                style="width: 250px; height: 250px" 
                autoplay 
                loop>
            </dotlottie-wc>
        </div>
    </div>

    <a href="character.html" class="back-btn">&larr; Back to Cast</a>

    <script>
        const audio = document.getElementById('shweta-music');
        const overlay = document.getElementById('interact-overlay');
        const descText = "Shweta is the undisputed 'photogenic miracle' of the group—the 'cutie baby' who makes every grimace look like a high-fashion cover. While she radiates pure innocence, her life is a masterclass in accidental chaos; she is a magnet for spills, famous for mistaking tomato puree for a seat. \n\nBeyond the clumsiness, she is the ultimate 'human pillow,' the group's safest harbor and non-judgmental confidante. She is best cuddle buddy you need after a tiring day. She is totatally made for camera, her pictures comes out looking amazing everytime. She just needs to give her bright smile as always and the pictures turns out to be like a magazine cover picture. Though she started as a sweet soul, we've trained her well—she's transformed into a 'Chota Rowdy' with a spicy fighting spirit who can definitely hold her own.";
        
        let i = 0;
        function typeWriter() {
            if (i < descText.length) {
                document.getElementById("shweta-desc").innerHTML += descText.charAt(i);
                i++;
                setTimeout(typeWriter, 30);
            }
        }

        function playJohnSegment() {
            audio.currentTime = 6;
            audio.play();
            audio.ontimeupdate = function() {
                if (audio.currentTime >= 20) {
                    audio.currentTime = 6;
                }
            };
        }

        overlay.addEventListener('click', () => {
            playJohnSegment();
            overlay.style.display = 'none';
            typeWriter();
        });

        window.onload = () => {
            audio.play().then(() => {
                audio.pause();
                playJohnSegment();
                overlay.style.display = 'none';
                typeWriter();
            }).catch(() => {
                console.log("Waiting for interaction...");
            });
        };
    </script>
</body>
</html>
