<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shrishti Jain | Heart of the Show</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@lottiefiles/dotlottie-wc@0.9.10/dist/dotlottie-wc.js" type="module"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: #fce4ec; /* Soft pink to match the gradient */
            font-family: 'Fredoka', sans-serif;
            overflow: hidden;
        }

        .shrishti-header {
            position: relative;
            width: 100vw;
            height: 100vh;
            background-image: url('shrishti_ch.jpg'); 
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
        }

        /* Positioned to the left to avoid overlapping Shrishti on the right */
        .typing-container {
            width: 700px;
            position: absolute;
            top: 30%; 
            left: 20%; 
            z-index: 10;
        }

        .typing-text {
            font-size: 1.1rem;
            line-height: 1.8;
            letter-spacing: 0.01em;
            color: #6a1b9a; /* Deep purple matching her title */
            font-weight: 600;
            text-align: left;
            display: inline-block;
            white-space: pre-wrap;
        }

        /* Animation - Positioned bottom left, above the back button */
        .lottie-container {
            position: absolute;
            bottom: 80px; /* Elevated to sit above the button */
            left: 10px;
            z-index: 5;
        }

        .back-btn {
            position: fixed;
            bottom: 30px;
            left: 30px;
            padding: 12px 25px;
            background: white;
            color: #6a1b9a;
            border-radius: 8px;
            text-decoration: none;
            z-index: 100;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        #interact-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0);
            z-index: 9999;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="interact-overlay"></div>

    <audio id="shrishti-music">
        <source src="john.mp3" type="audio/mpeg">
    </audio>

    <div class="shrishti-header">
        <div class="typing-container">
            <span class="typing-text" id="shrishti-desc"></span>
        </div>

        <!-- Animation Section -->
        <div class="lottie-container">
            <dotlottie-wc 
                src="https://lottie.host/3162ca20-a574-4ddb-b70f-0802dbe906e5/UInfIdhVxY.lottie" 
                style="width: 200px; height: 200px" 
                autoplay 
                loop>
            </dotlottie-wc>
        </div>
    </div>

    <a href="character.html" class="back-btn">&larr; Back to Cast</a>

    <script>
        const audio = document.getElementById('shrishti-music');
        const overlay = document.getElementById('interact-overlay');
        const descText = "Shrishti Jain is the soul and the soundtrack of the squad, a girl with a voice so incredible she could easily lead a Broadway production. True to her tagline, she is the emotional center of the group—a loyal friend and a top-tier cuddle partner who brings a sense of warmth wherever she goes. However, her 'Heart of the Show' status comes with a side of hilarious chaos; she is arguably the clumsiest person to ever walk the earth. Shrishti has turned tripping into an art form, capable of losing her footing on a perfectly plain, flat surface for absolutely no reason at all. \nWhen she isn’t accidentally gravity-testing the floor, she is letting out a laugh so legendary and loud it can be heard from two miles away. A professional-level sleeper, she likely wins the gold medal in any napping competition. Above all, she is the heartbeat of the circle, loved exactly for the clumsy, melodic, and joyful person she is.";
        
        let i = 0;
        function typeWriter() {
            if (i < descText.length) {
                document.getElementById("shrishti-desc").innerHTML += descText.charAt(i);
                i++;
                setTimeout(typeWriter, 30);
            }
        }

        function playJohnSegment() {
            audio.currentTime = 6;
            audio.play();
            audio.ontimeupdate = function() {
                if (audio.currentTime >= 20) {
                    audio.currentTime = 6;
                }
            };
        }

        overlay.addEventListener('click', () => {
            playJohnSegment();
            overlay.style.display = 'none';
            typeWriter();
        });

        window.onload = () => {
            audio.play().then(() => {
                audio.pause();
                playJohnSegment();
                overlay.style.display = 'none';
                typeWriter();
            }).catch(() => {
                console.log("Waiting for interaction...");
            });
        };
    </script>
</body>
</html>
