<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heyy Maitraiye | Sanctuary</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }

        .game-selection-container {
            position: relative;
            width: 100%;
            height: 100vh;
            background-image: url('maitraiye.jpg');
            background-size: cover; 
            background-repeat: no-repeat;
            background-position: center center;
        }

        /* Container for the two game clickable areas */
        .game-overlay {
            position: absolute;
            top: 36%; /* Positioned over the game graphics */
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            justify-content: center;
            gap: 12%; 
            width: 58%;
            height: 32%;
            /* border: 2px solid red; */ /* Uncomment to see the alignment boxes */
        }

        .game-link {
            flex: 1;
            text-decoration: none;
            cursor: pointer;
            border-radius: 15px;
            /* border: 1px solid blue; */ /* Uncomment to see the alignment boxes */
            transition: background 0.3s ease;
        }

        /* Subtle feedback when hovering over the game boxes */
        .game-link:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        /* White Back Button - Bottom Left Corner */
        .back-container {
            position: absolute;
            bottom: 20px;
            left: 20px;
            z-index: 100;
        }

        .back-btn {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 6px 15px;
            background-color: #ffffff;
            border: 1px solid #ddd;
            border-radius: 5px;
            color: #000000;
            text-decoration: none;
            font-family: Arial, sans-serif;
            font-size: 12px;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: background 0.2s;
        }

        .back-btn:hover {
            background-color: #f0f0f0;
        }
    </style>
</head>
<body>

    <div class="game-selection-container">
        
        <div class="back-container">
            <a href="frnd.html" class="back-btn">
                <span>&larr;</span> Back
            </a>
        </div>

        <div class="game-overlay">
            <a href="this_or_that_maitraiye.html" class="game-link" title="Play This or That"></a>
            
            <a href="q_and_a_maitraiye.html" class="game-link" title="Play Q&A"></a>
        </div>

    </div>

</body>
</html>
