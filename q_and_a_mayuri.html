<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q&A Quiz | Sanctuary</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #fdf2e9; /* Matches the warmth of your project */
        }

        .quiz-container {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding-bottom: 80px; /* Space for the back button */
        }

        /* Styling the iframe to look clean */
        iframe {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 90%;
            height: 90%;
        }

        /* Matching your white back button from previous pages */
        .back-container {
            position: absolute;
            bottom: 20px;
            left: 20px;
            z-index: 100;
        }

        .back-btn {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 6px 15px;
            background-color: #ffffff;
            border: 1px solid #ddd;
            border-radius: 5px;
            color: #000;
            text-decoration: none;
            font-family: Arial, sans-serif;
            font-size: 12px;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <div class="quiz-container">
        <iframe src="https://wayground.com/join/quiz/69f4d695377c7f02e17e050f/start?studentShare=true" title="Quizizz Quiz"></iframe>
    </div>

    <div class="back-container">
        <a href="mayuri.html" class="back-btn">
            <span>&larr;</span> Back
        </a>
    </div>

</body>
</html>
