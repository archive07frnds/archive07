<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mayuri | The Picture Perfect</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@lottiefiles/dotlottie-wc@0.9.10/dist/dotlottie-wc.js" type="module"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: #87CEEB; 
            font-family: 'Fredoka', sans-serif;
            overflow: hidden;
        }

        .may-header {
            position: relative;
            width: 100vw;
            height: 100vh;
            background-image: url('mayuri_ch.jpg'); 
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
        }

        /* Positioned to the left and centered vertically without jumping */
.typing-container {
    width: 800px; /* Fixed width to keep it away from Mayuri on the right */
    position: absolute;
    top: 30%; /* Fixed starting point so it grows DOWN, not UP */
    right: 25%; /* Pushed to the far left to avoid the center title */
    z-index: 10;
}

.typing-text {
    font-size: 1.1rem;
    line-height: 1.8;
    letter-spacing: 0.01em;
    color: #170C79; 
    font-weight: 600;
    text-align: right;
    display: inline-block;
    white-space: pre-wrap;
    /* Optional: adds a slight shadow to make it pop against the blue */
    text-shadow: 1px 1px 2px rgba(255,255,255,0.3);
}

/* Adjusting the animation so it doesn't overlap the new text position */
.lottie-upper-left {
    position: absolute;
    top: 35px;
    left: 20px;
    z-index: 1; /* Lower z-index so text stays readable if they touch */
    opacity: 0.7;
}

.speech-bubble {
            position: absolute;
            top: 10px; /* Positioned above the elephant */
            left: 100px;
            background: #ffffff;
            color: #2c3e50;
            padding: 10px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            width: 200px;
            text-align: center;
            border: 2px solid #e67e22;
        }

        /* The little tail of the bubble */
        .speech-bubble::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 30px;
            border-width: 10px 10px 0;
            border-style: solid;
            border-color: #ffffff transparent transparent;
        }

        .back-btn {
            position: fixed;
            bottom: 30px;
            left: 30px;
            padding: 12px 25px;
            background: white;
            color: #170C79;
            border-radius: 8px;
            text-decoration: none;
            z-index: 100;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: 0.3s;
        }

        #interact-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0);
            z-index: 9999;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="interact-overlay"></div>

    <audio id="may-music" loop>
        <source src="john.mp3" type="audio/mpeg">
    </audio>

    <div class="may-header">
        <!-- New Animation in Upper Left -->
        <div class="lottie-upper-left">
            <dotlottie-wc 
                src="https://lottie.host/be3e6eb0-a562-4d9e-bb2a-0ad13489cade/RdPUnwSEHR.lottie" 
                style="width: 250px; height: 250px" 
                autoplay 
                loop>
            </dotlottie-wc>
        </div>
    <div class="speech-bubble">Hi, I am her chotu sa Gandu, and she definitely loves me more.</div>
    
        <div class="typing-container">
            <span class="typing-text" id="may-desc"></span>
        </div>
    </div>

    <a href="character.html" class="back-btn">&larr; Back to Cast</a>

    <script>
        const audio = document.getElementById('may-music');
        const overlay = document.getElementById('interact-overlay');
        const descText = "Mayuri is the literal sunshine of the squad, a vibrant force of nature who breathes life into every room with her infectious laughter and drama. A true cinematic soul, her acting range is legendary—she can seamlessly transition from the fierce intensity of Kali Mata to the slithering sass of a Nāgin. While she is our undisputed guru of poses, her personal cupboard is a beautiful chaos—a verified treasury of fashion everyone secretly plans to heist one day.\n\nBeyond the glamour, Mayuri is the heart of our home away from home. She is a selfless soul who never asks for anything in return, making the distance from home vanish whenever we were sick. She loves us even more than 'Gandu,' her elephant soft toy—though she frequently kicks poor Gandu onto the floor in her sleep. To have Mayuri around is to have a constant celebration of life and deep, unquantifiable friendship.";
        
        let i = 0;
        function typeWriter() {
            if (i < descText.length) {
                document.getElementById("may-desc").innerHTML += descText.charAt(i);
                i++;
                setTimeout(typeWriter, 30);
            }
        }

        overlay.addEventListener('click', () => {
            audio.play();
            overlay.style.display = 'none';
            typeWriter();
        });

        window.onload = () => {
            audio.play().then(() => {
                overlay.style.display = 'none';
                typeWriter();
            }).catch(() => {
                console.log("Waiting for interaction...");
            });
        };
    </script>
</body>
</html>
